# Component B — Source confidence scores (max 20)
source_scores:
  license_table: 20
  clerk_table: 20
  news_article: 15
  search_snippet: 8

# Component C — Address completeness scores (max 15)
# Keys are symbolic; code checks: has street + city + zip → 15; street + city → 10; city only → 5; else → 0
address_scores:
  street_city_zip: 15
  street_city: 10
  city_only: 5
  none: 0

# Component D — Recency scores (max 15)
# Days thresholds and corresponding scores. Checked in order.
recency_scores:
  - max_days: 7
    score: 15
  - max_days: 14
    score: 10
  - max_days: 30
    score: 5
  - max_days: null  # fallback
    score: 0
