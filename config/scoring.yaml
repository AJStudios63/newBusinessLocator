  retail: 45
  liquor: 42
  salon: 40
  bakery: 40
  spa: 38
  food_service: 35
  automotive: 25
  services: 20
  other: 10
  consulting: 5
  real_estate: 5
  construction: 5
  cleaning: 5

# Keyword lists used to classify raw_type into business_type.
